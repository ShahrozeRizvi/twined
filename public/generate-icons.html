<!DOCTYPE html>
<html>
<head>
  <title>Twined Icon Generator</title>
  <link href="https://fonts.googleapis.com/css2?family=Pinyon+Script&display=swap" rel="stylesheet">
  <style>
    body { 
      font-family: sans-serif; 
      display: flex; 
      flex-direction: column; 
      align-items: center; 
      padding: 40px; 
      background: #f5f5f5; 
      gap: 24px;
    }
    canvas { 
      border-radius: 18%; 
      box-shadow: 0 8px 32px rgba(0,0,0,0.15); 
      width: 256px; 
      height: 256px;
    }
    .buttons { 
      display: flex; 
      flex-wrap: wrap; 
      gap: 10px; 
      justify-content: center;
    }
    button { 
      padding: 10px 20px; 
      background: #9B7FE8; 
      color: white; 
      border: none; 
      border-radius: 8px; 
      cursor: pointer; 
      font-size: 14px;
    }
    button:hover { background: #8b6fd8; }
    #status {
      font-size: 13px;
      color: #666;
    }
  </style>
</head>
<body>
  <h2 style="color: #9B7FE8; font-family: sans-serif;">
    Twined Icon Generator
  </h2>
  <canvas id="preview" width="1024" height="1024"></canvas>
  <p id="status">Loading font...</p>
  <div class="buttons" id="buttons"></div>
  
  <script>
    const sizes = [1024, 512, 192, 144, 96, 72];
    
    function drawIcon(canvas) {
      const size = canvas.width;
      const ctx = canvas.getContext('2d');
      const radius = size * 0.15;
      
      ctx.clearRect(0, 0, size, size);
      
      ctx.beginPath();
      ctx.moveTo(radius, 0);
      ctx.lineTo(size - radius, 0);
      ctx.quadraticCurveTo(size, 0, size, radius);
      ctx.lineTo(size, size - radius);
      ctx.quadraticCurveTo(size, size, size - radius, size);
      ctx.lineTo(radius, size);
      ctx.quadraticCurveTo(0, size, 0, size - radius);
      ctx.lineTo(0, radius);
      ctx.quadraticCurveTo(0, 0, radius, 0);
      ctx.closePath();
      ctx.fillStyle = '#FAF8F3';
      ctx.fill();
      
      ctx.fillStyle = '#9B7FE8';
      ctx.font = (size * 0.54) + 'px "Pinyon Script"';
      ctx.textAlign = 'center';
      ctx.textBaseline = 'middle';
      ctx.fillText('Twined', size / 2, size / 2 + (size * 0.04));
    }
    
    function downloadSize(sourceCanvas, size) {
      const temp = document.createElement('canvas');
      temp.width = size;
      temp.height = size;
      const ctx = temp.getContext('2d');
      ctx.drawImage(sourceCanvas, 0, 0, size, size);
      const link = document.createElement('a');
      link.download = 'twined-icon-' + size + '.png';
      link.href = temp.toDataURL('image/png');
      link.click();
    }
    
    document.fonts.ready.then(() => {
      return document.fonts.load('100px "Pinyon Script"')
    }).then(() => {
      const preview = document.getElementById('preview');
      drawIcon(preview);
      
      document.getElementById('status').textContent = 
        'Font loaded. Click a size to download.';
      
      const container = document.getElementById('buttons');
      sizes.forEach(size => {
        const btn = document.createElement('button');
        btn.textContent = size + ' × ' + size;
        btn.onclick = () => downloadSize(preview, size);
        container.appendChild(btn);
      });
    }).catch(() => {
      document.getElementById('status').textContent = 
        'Font load failed. Try refreshing.';
    });
  </script>
</body>
</html>
